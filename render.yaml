services:
  - type: web
    name: berrypatchguide
    env: python
    plan: free
    buildCommand: "cd backend && pip install -r requirements.txt && python -m playwright install chromium"
    startCommand: "cd backend && uvicorn main:app --host 0.0.0.0 --port 10000"
    envVars:
      - key: PYTHON_VERSION
        value: "3.11"
    healthCheckPath: /healthz
